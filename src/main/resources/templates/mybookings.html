<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Bookings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/assets/CSS/mybookings.css}">
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

    <span class="navbar-brand fw-bold">

        <i class="bi bi-journal-text"></i>

        <span th:if="${role=='admin'}">
            Admin Bookings
        </span>

        <span th:if="${role=='superadmin'}">
            Super Admin Bookings
        </span>

        <span th:if="${role=='user'}">
            My Bookings
        </span>

    </span>

    <div class="d-flex align-items-center">

        <span class="text-white me-3"
              th:if="${role=='admin' || role=='superadmin'}">

            <i class="bi bi-person-circle"></i>

            <span th:text="${#strings.toUpperCase(role)}"></span>

            :

            <span th:text="${userId}"></span>

        </span>

        <a th:if="${role=='admin' || role=='superadmin'}"
           th:href="@{/dashboard}"
           class="btn btn-secondary me-2">

            Dashboard

        </a>

        <a th:href="@{/rooms}"
           class="btn btn-primary me-2">

            <i class="bi bi-house-door"></i>

            Rooms

        </a>

        <a th:href="@{/logout}"
           class="btn btn-danger">

            <i class="bi bi-box-arrow-right"></i>

            Logout

        </a>

    </div>

</nav>

<div class="container mt-4 fade-in">

    <div class="card card-box p-4">

        <h4 class="mb-4">

            <i class="bi bi-list-check"></i>

            Booking List

        </h4>

        <div class="table-responsive">

            <table class="table table-hover text-center align-middle">

                <thead>

                <tr>

                    <th>ID</th>

                    <th th:if="${role=='admin' || role=='superadmin'}">
                        Username
                    </th>

                    <th>Room Number</th>

                    <th>Check In</th>

                    <th>Check Out</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(bookings)}">

                    <td th:colspan="${role=='admin' || role=='superadmin'} ? 7 : 6">

                        <i class="bi bi-exclamation-circle"></i>

                        No bookings found

                    </td>

                </tr>

                <tr th:each="booking : ${bookings}">

                    <td th:text="${booking.id}"></td>

                    <td th:if="${role=='admin' || role=='superadmin'}"
                        th:text="${booking.user.username}">
                    </td>

                    <td th:text="${booking.room.roomNumber}"></td>

                    <td th:text="${booking.checkIn}"></td>

                    <td th:text="${booking.checkOut}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:if="${booking.status=='booked'}">

                            Booked

                        </span>

                        <span class="badge bg-primary"
                              th:if="${booking.status=='checked_in'}">

                            Checked In

                        </span>

                        <span class="badge bg-dark"
                              th:if="${booking.status=='checked_out'}">

                            Checked Out

                        </span>

                        <span class="badge bg-danger"
                              th:if="${booking.status=='cancelled'}">

                            Cancelled

                        </span>

                    </td>

                    <td>

                        <form th:if="${role=='admin' || role=='superadmin'}"
                              th:action="@{/booking/action}"
                              method="post"
                              class="d-inline">

                            <input type="hidden"
                                   name="booking_id"
                                   th:value="${booking.id}">

                            <input type="hidden"
                                   name="action"
                                   value="checkin">

                            <button class="btn btn-success btn-sm">

                                Check In

                            </button>

                        </form>

                        <form th:if="${role=='admin' || role=='superadmin'}"
                              th:action="@{/booking/action}"
                              method="post"
                              class="d-inline">

                            <input type="hidden"
                                   name="booking_id"
                                   th:value="${booking.id}">

                            <input type="hidden"
                                   name="action"
                                   value="checkout">

                            <button class="btn btn-primary btn-sm">

                                Check Out

                            </button>

                        </form>

                        <form th:action="@{/booking/action}"
                              method="post"
                              class="d-inline">

                            <input type="hidden"
                                   name="booking_id"
                                   th:value="${booking.id}">

                            <input type="hidden"
                                   name="action"
                                   value="cancel">

                            <button class="btn btn-danger btn-sm"
                                    onclick="return confirm('Cancel booking?')">

                                Cancel

                            </button>

                        </form>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
