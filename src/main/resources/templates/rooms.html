<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

<title>Rooms</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
      th:href="@{/assets/CSS/rooms.css}">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">
            Hotel Booking
        </span>

        <div>

            <!-- SUPERADMIN -->
            <a th:if="${session.role == 'superadmin'}"
               th:href="@{/superadmin}"
               class="btn btn-info me-2">
                Dashboard
            </a>

            <!-- ADMIN -->
            <a th:if="${session.role == 'admin'}"
               th:href="@{/dashboard}"
               class="btn btn-secondary me-2">
                Dashboard
            </a>

            <!-- BOOKINGS -->
            <a th:href="@{/mybookings}"
               class="btn btn-success me-2">
                My Bookings
            </a>

            <!-- ADD ROOM -->
            <a th:if="${session.role == 'admin' or session.role == 'superadmin'}"
               th:href="@{/admin}"
               class="btn btn-warning me-2">
                Add Room
            </a>

            <!-- LOGOUT -->
            <a th:href="@{/logout}"
               class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<!-- MAIN -->
<div class="container mt-4 fade-in">

    <h2 class="mb-4">
        Available Rooms
    </h2>

    <div class="row">

        <div class="col-md-6 mb-4"
             th:each="room : ${rooms}">

            <div class="card card-room p-4">

                <h3>
                    Room
                    <span th:text="${room.roomNumber}"></span>
                </h3>

                <p class="text-muted">
                    Type:
                    <span th:text="${room.type}"></span>
                </p>

                <p class="price">
                    $
                    <span th:text="${room.price}"></span>
                    / night
                </p>

                <form th:action="@{/booking}" method="post">

                    <input type="hidden"
                           name="room_id"
                           th:value="${room.id}">

                    <div class="row mb-3">

                        <div class="col">
                            <input class="form-control"
                                   type="date"
                                   name="check_in"
                                   required>
                        </div>

                        <div class="col">
                            <input class="form-control"
                                   type="date"
                                   name="check_out"
                                   required>
                        </div>

                    </div>

                    <button class="btn btn-primary w-100">
                        Book Now
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
