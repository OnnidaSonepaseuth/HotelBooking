<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/assets/CSS/forgot.css}">

</head>
<body>

<div class="box">


<h3 class="mb-4 text-center">

    Change Password

</h3>

<!-- ERROR MESSAGES -->

<div class="alert alert-danger text-center"
     th:if="${param.error == 'wrong'}">

    Old password is incorrect

</div>

<div class="alert alert-danger text-center"
     th:if="${param.error == 'username'}">

    Username is required

</div>

<div class="alert alert-danger text-center"
     th:if="${param.error == 'oldpassword'}">

    Old password is required

</div>

<div class="alert alert-danger text-center"
     th:if="${param.error == 'newpassword'}">

    New password is required

</div>

<div class="alert alert-danger text-center"
     th:if="${param.error == 'passwordlength'}">

    Password must be at least 3 characters

</div>

<div class="alert alert-danger text-center"
     th:if="${param.error == 'server'}">

    Server error. Please try again

</div>

<!-- SUCCESS -->

<div class="alert alert-success text-center"
     th:if="${param.success == 'done'}">

    Password updated successfully

</div>

<form th:action="@{/forgot-password}"
      method="post">

    <!-- USERNAME -->

    <input
        class="form-control mb-3"
        name="username"
        placeholder="Username"
        required>

    <!-- OLD PASSWORD -->

    <div class="input-group mb-3">

        <input
            id="oldPass"
            class="form-control"
            type="password"
            name="oldPassword"
            placeholder="Old Password"
            required>

        <span
            class="input-group-text"
            onclick="toggleOld()"
            style="cursor:pointer">

            <i class="bi bi-eye"></i>

        </span>

    </div>

    <!-- NEW PASSWORD -->

    <div class="input-group mb-3">

        <input
            id="newPass"
            class="form-control"
            type="password"
            name="newPassword"
            placeholder="New Password"
            required>

        <span
            class="input-group-text"
            onclick="toggleNew()"
            style="cursor:pointer">

            <i class="bi bi-eye"></i>

        </span>

    </div>

    <button
        class="btn btn-warning w-100">

        Update Password

    </button>

</form>

<div class="text-center mt-3">

    <a th:href="@{/login}">

        Back to Login

    </a>

</div>

</div>

<script th:src="@{/assets/js/forgot.js}"></script>

</body>
</html>
