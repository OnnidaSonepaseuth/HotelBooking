<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>


<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/assets/CSS/register.css}">

</head>
<body>

<div class="register-container">


<!-- LEFT -->
<div class="left">
    <h1>Register</h1>
    <p>Create your account</p>
</div>

<!-- RIGHT -->
<div class="right">

    <h3 class="mb-4">Sign Up</h3>

    <!-- ERROR MESSAGE -->

    <div class="alert alert-danger"
         th:if="${param.error == 'exists'}">

        Username already exists

    </div>

    <div class="alert alert-danger"
         th:if="${param.error == 'email'}">

        Email already exists

    </div>

    <div class="alert alert-danger"
         th:if="${param.error == 'passwordlength'}">

        Password must be at least 3 characters

    </div>

    <div class="alert alert-danger"
         th:if="${param.error == 'server'}">

        Server error, please try again

    </div>

    <!-- SUCCESS -->

    <div class="alert alert-success"
         th:if="${param.success}">

        Registration successful

    </div>

    <form th:action="@{/register}" method="post">

        <!-- USERNAME -->

        <div class="mb-3">

            <label>Username</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-person"></i>
                </span>

                <input
                    type="text"
                    class="form-control"
                    name="username"
                    required>

            </div>

        </div>

        <!-- EMAIL -->

        <div class="mb-3">

            <label>Email</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>

                <input
                    type="email"
                    class="form-control"
                    name="email"
                    required>

            </div>

        </div>

        <!-- PASSWORD -->

        <div class="mb-3">

            <label>Password</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>

                <input
                    id="password"
                    type="password"
                    class="form-control"
                    name="password"
                    required>

                <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="togglePass()">

                    <i id="eyeIcon" class="bi bi-eye"></i>

                </button>

            </div>

        </div>

        <button
            class="btn btn-success w-100 btn-register mb-3"
            type="submit">

            Register

        </button>

    </form>

    <div class="text-center">

        <a th:href="@{/login}">
            Already have an account? Login
        </a>

    </div>

</div>


</div>

<script th:src="@{/assets/js/register.js}"></script>

</body>
</html>
