<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Payments</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet"
      th:href="@{/assets/CSS/payments.css}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">

            Payments

        </span>

        <div>

            <a th:href="@{/dashboard}"
               class="btn btn-secondary me-2">

                Dashboard

            </a>

            <a th:href="@{/logout}"
               class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

</nav>

<div class="container mt-4 fade-in">

    <div class="card-box bg-success mb-4">

        <h5>Total Revenue</h5>

        <h2>

            $<span th:text="${revenue}">
                0
            </span>

        </h2>

    </div>

    <div class="card p-3 mb-4">

        <h5>
            Revenue (Last 7 Days)
        </h5>

        <canvas id="chart"></canvas>

    </div>

    <div class="card p-3">

        <h5>
            Payment History
        </h5>

        <table class="table table-bordered text-center">

            <thead class="table-dark">

                <tr>

                    <th>User</th>
                    <th>Room</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th>Total</th>

                </tr>

            </thead>

			<tbody>

			<tr th:each="p : ${payments}">

			    <td th:text="${p.user.username}">
			        User
			    </td>

			    <td th:text="${p.room.roomNumber}">
			        Room
			    </td>

			    <td th:text="${p.checkIn}">
			        Check In
			    </td>

			    <td th:text="${p.checkOut}">
			        Check Out
			    </td>

			    <td>
			        $<span th:text="${p.room.price}">
			            0
			        </span>
			    </td>

			</tr>

			</tbody>

        </table>

    </div>

</div>

<script th:inline="javascript">

let chartLabels =
/*[[${chartLabels}]]*/ [];

let chartData =
/*[[${chartData}]]*/ [];

</script>

<script th:src="@{/assets/js/payments.js}"></script>

</body>
</html>
