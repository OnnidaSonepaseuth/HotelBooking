<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Reports</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet"
      th:href="@{/assets/CSS/reports.css}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

    <span class="navbar-brand">
        Reports
    </span>

    <div>

        <a th:href="@{/dashboard}"
           class="btn btn-secondary me-2">

            Dashboard

        </a>

        <a th:href="@{/logout}"
           class="btn btn-danger">

            Logout

        </a>

    </div>

</div>


</nav>

<div class="container mt-4 fade-in">

<div class="row mb-4">

    <div class="col-md-3">

        <div class="card-box bg-primary">

            <h6>Total Bookings</h6>

            <h3 th:text="${totalBookings}">
                0
            </h3>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card-box bg-success">

            <h6>Total Users</h6>

            <h3 th:text="${totalUsers}">
                0
            </h3>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card-box bg-warning text-dark">

            <h6>Total Rooms</h6>

            <h3 th:text="${totalRooms}">
                0
            </h3>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card-box bg-danger">

            <h6>Revenue</h6>

            <h3>

                $

                <span th:text="${revenue}">
                    0
                </span>

            </h3>

        </div>

    </div>

</div>

<div class="card p-3">

    <h5>
        Bookings (Last 7 Days)
    </h5>

    <canvas id="chart"></canvas>

</div>
</div>

<script th:inline="javascript">

let chartLabels = /*[[${chartLabels}]]*/ [];
let chartData = /*[[${chartData}]]*/ [];

</script>

<script th:src="@{/assets/js/reports.js}">
</script>

</body>
</html>
