<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Add Room</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet"
      th:href="@{/assets/CSS/admin.css}">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">

            <i class="fa fa-bed"></i>

            Add Room

        </span>

        <div>

            <!-- SUPERADMIN -->
            <a th:if="${session.role == 'superadmin'}"
               th:href="@{/superadmin}"
               class="btn btn-info me-2">

                Dashboard

            </a>

            <!-- ADMIN -->
            <a th:if="${session.role == 'admin'}"
               th:href="@{/dashboard}"
               class="btn btn-secondary me-2">

                Dashboard

            </a>

            <a th:href="@{/rooms}"
               class="btn btn-success me-2">

                Rooms

            </a>

            <a th:href="@{/logout}"
               class="btn btn-danger">

                Logout

            </a>

        </div>

    </div>

</nav>

<!-- MAIN -->
<div class="container">

    <div class="card-box">

        <h2 class="mb-4 text-center">

            <i class="fa fa-plus-circle text-primary"></i>

            Add New Room

        </h2>

        <form th:action="@{/addRoom}"
              method="post">

            <!-- ROOM NUMBER -->
            <div class="mb-3">

                <label class="form-label">

                    Room Number

                </label>

                <input type="text"
                       name="room_number"
                       class="form-control"
                       placeholder="Enter room number"
                       required>

            </div>

            <!-- ROOM TYPE -->
            <div class="mb-3">

                <label class="form-label">

                    Room Type

                </label>

                <input type="text"
                       name="type"
                       class="form-control"
                       placeholder="Enter room type"
                       required>

            </div>

            <!-- PRICE -->
            <div class="mb-4">

                <label class="form-label">

                    Price

                </label>

                <input type="number"
                       step="0.01"
                       name="price"
                       class="form-control"
                       placeholder="Enter price"
                       required>

            </div>

            <button class="btn btn-primary w-100">

                <i class="fa fa-save"></i>

                Add Room

            </button>

        </form>

    </div>

</div>

</body>
</html>
