<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Edit User</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet"
      th:href="@{/assets/CSS/editUser.css}">

</head>

<body>

<div class="container mt-5 fade-in">

    <div class="edit-box">

        <h2 class="mb-4">

            <i class="fa fa-user-edit"></i>

            Edit User

        </h2>

        <form th:action="@{/updateUser}"
              method="post">

            <input type="hidden"
                   name="id"
                   th:value="${editUser.id}">

            <!-- USERNAME -->

            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       th:value="${editUser.username}"
                       required>

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label class="form-label">

                    Password

                </label>

                <input type="text"
                       name="password"
                       class="form-control"
                       th:value="${editUser.password}"
                       required>

            </div>

            <!-- ROLE -->

            <div class="mb-4">

                <label class="form-label">

                    Role

                </label>

                <select name="role"
                        class="form-select">

                    <option value="user"
                            th:selected="${editUser.role=='user'}">

                        User

                    </option>

                    <option value="admin"
                            th:selected="${editUser.role=='admin'}">

                        Admin

                    </option>

                    <option value="superadmin"
                            th:selected="${editUser.role=='superadmin'}">

                        Super Admin

                    </option>

                </select>

            </div>

            <button class="btn btn-success save-btn">

                <i class="fa fa-save"></i>

                Update

            </button>

            <a th:href="@{/users}"
               class="btn btn-secondary">

                Back

            </a>

        </form>

    </div>

</div>

</body>
</html>
