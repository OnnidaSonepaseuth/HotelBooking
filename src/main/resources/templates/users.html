<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Users Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet"
th:href="@{/assets/CSS/users.css}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand fw-bold">

            <i class="fa fa-users"></i>

            Users Management

        </span>

        <div>

            <a th:if="${session.role == 'superadmin'}"
               th:href="@{/superadmin}"
               class="btn btn-info me-2">

                <i class="fa fa-crown"></i>
                Super Panel

            </a>

            <a th:if="${session.role == 'admin'}"
               th:href="@{/dashboard}"
               class="btn btn-secondary me-2">

                <i class="fa fa-chart-line"></i>
                Dashboard

            </a>

            <a th:href="@{/logout}"
               class="btn btn-danger">

                <i class="fa fa-sign-out-alt"></i>
                Logout

            </a>

        </div>

    </div>

</nav>

<div class="container mt-4 fade-in">

    <div class="alert alert-success"
         th:if="${param.msg != null and param.msg[0] == 'deleted'}">

        ✅ User deleted successfully

    </div>

    <div class="card-box">

        <div class="top-box">

            <div>

                <h2 class="page-title">

                    <i class="fa fa-user-shield"></i>

                    User List

                </h2>

                <small class="text-muted">

                    Manage all users in system

                </small>

            </div>

            <a th:href="@{/add-user}"
               class="btn btn-success add-btn">

                <i class="fa fa-plus"></i>

                Add User

            </a>

        </div>

        <div class="search-box">

            <input type="text"
                   id="searchInput"
                   class="form-control"
                   placeholder="Search username...">

        </div>

        <div class="table-responsive">

            <table class="table modern-table text-center align-middle"
                   id="userTable">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Username</th>
                    <th>Role</th>
                    <th width="230">Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="user : ${users}">

                    <td>

                        <b th:text="${user.id}"></b>

                    </td>

                    <td class="username-cell">

                        <i class="fa fa-user"></i>

                        <span th:text="${user.username}"></span>

                    </td>

                    <td>

                        <span th:if="${user.role == 'superadmin'}"
                              class="role-badge role-super">

                            SUPER ADMIN

                        </span>

                        <span th:if="${user.role == 'admin'}"
                              class="role-badge role-admin">

                            ADMIN

                        </span>

                        <span th:if="${user.role == 'user'}"
                              class="role-badge role-user">

                            USER

                        </span>

                    </td>

                    <td>

                        <span th:if="${session.role == 'superadmin'
                             || (session.role == 'admin'
                             && user.role == 'user')}">

                            <a th:href="@{/edit-user(id=${user.id})}"
                               class="btn btn-warning btn-sm">

                                <i class="fa fa-edit"></i>

                                Edit

                            </a>

                            <form th:action="@{/deleteUser}"
                                  method="post"
                                  style="display:inline;"
                                  onsubmit="return confirm('Delete this user?');">

                                <input type="hidden"
                                       name="id"
                                       th:value="${user.id}">

                                <button class="btn btn-danger btn-sm">

                                    <i class="fa fa-trash"></i>

                                    Delete

                                </button>

                            </form>

                        </span>

                        <span th:unless="${session.role == 'superadmin'
                             || (session.role == 'admin'
                             && user.role == 'user')}"
                              class="badge bg-dark">

                            NO ACCESS

                        </span>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

const searchInput =
document.getElementById("searchInput");

searchInput.addEventListener("keyup", function(){

    const value =
    this.value.toLowerCase();

    const rows =
    document.querySelectorAll("#userTable tbody tr");

    rows.forEach(row => {

        const username =
        row.children[1].innerText.toLowerCase();

        row.style.display =
        username.includes(value)
        ? ""
        : "none";

    });

});

</script>

</body>
</html>
