<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet"
      th:href="@{/assets/CSS/dashboard.css}">

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

    <h4>

        <i class="fa-solid fa-hotel"></i>

        HOTEL

    </h4>

    <a th:href="@{/dashboard}" class="active">

        <i class="fa fa-chart-line"></i>

        Dashboard

    </a>

    <a th:href="@{/rooms}">

        <i class="fa fa-bed"></i>

        Rooms

    </a>

    <a th:href="@{/users}">

        <i class="fa fa-users"></i>

        Users

    </a>

    <a th:href="@{/reports}">

        <i class="fa fa-chart-bar"></i>

        Reports

    </a>

    <a th:href="@{/payments}">

        <i class="fa fa-dollar-sign"></i>

        Payments

    </a>

    <a th:href="@{/mybookings}">

        <i class="fa fa-calendar-check"></i>

        Bookings

    </a>

    <a th:href="@{/profile}">

        <i class="fa fa-user"></i>

        Profile

    </a>

    <a th:href="@{/messages}">

        <i class="fa-solid fa-envelope"></i>

        Contact

    </a>

    <a th:href="@{/reviews}">

        <i class="fa-solid fa-star"></i>

        Reviews

    </a>

    <a th:if="${session.role == 'superadmin'}"
       th:href="@{/superadmin}">

        <i class="fa-solid fa-crown text-warning"></i>

        Super Admin

    </a>

    <a th:href="@{/logout}">

        <i class="fa fa-sign-out-alt"></i>

        Logout

    </a>

</div>

<!-- MAIN -->

<div class="main fade-in">

    <!-- TOPBAR -->

    <div class="topbar">

        <div>

            <h2>

                <i class="fa-solid fa-chart-pie"></i>

                Dashboard

            </h2>

            <small class="text-muted">

                Hotel Booking Management System

            </small>

        </div>

        <div>

            <span th:if="${session.role == 'superadmin'}"
                  class="role-badge superadmin-badge">

                <i class="fa-solid fa-crown"></i>

                SUPER ADMIN

            </span>

            <span th:if="${session.role == 'admin'}"
                  class="role-badge admin-badge">

                <i class="fa-solid fa-user-shield"></i>

                ADMIN

            </span>

            <span class="ms-2">

                ID:
                <span th:text="${session.userId}"></span>

            </span>

        </div>

    </div>

    <!-- STATS -->

    <div class="row mb-4">

        <div class="col-md-3 mb-3">

            <div class="card-box bg-primary">

                <h5>

                    <i class="fa fa-calendar"></i>

                    Bookings

                </h5>

                <h2 th:text="${totalBookings}"></h2>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card-box bg-success">

                <h5>

                    <i class="fa fa-users"></i>

                    Users

                </h5>

                <h2 th:text="${totalUsers}"></h2>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card-box bg-warning text-dark">

                <h5>

                    <i class="fa fa-bed"></i>

                    Rooms

                </h5>

                <h2 th:text="${totalRooms}"></h2>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card-box bg-info">

                <h5>

                    <i class="fa-solid fa-star"></i>

                    Reviews

                </h5>

                <h2 th:text="${totalReviews}"></h2>

            </div>

        </div>

    </div>

    <!-- QUICK MENU -->

    <div class="row mb-4">

        <div class="col-md-3 mb-3">

            <a th:href="@{/users}" class="text-decoration-none">

                <div class="quick-card">

                    <i class="fa-solid fa-users"></i>

                    <h5>Manage Users</h5>

                </div>

            </a>

        </div>

        <div class="col-md-3 mb-3">

            <a th:href="@{/rooms}" class="text-decoration-none">

                <div class="quick-card">

                    <i class="fa-solid fa-bed"></i>

                    <h5>Manage Rooms</h5>

                </div>

            </a>

        </div>

        <div class="col-md-3 mb-3">

            <a th:href="@{/payments}" class="text-decoration-none">

                <div class="quick-card">

                    <i class="fa-solid fa-money-bill-wave"></i>

                    <h5>Payments</h5>

                </div>

            </a>

        </div>

        <div class="col-md-3 mb-3">

            <a th:href="@{/reports}" class="text-decoration-none">

                <div class="quick-card">

                    <i class="fa-solid fa-chart-column"></i>

                    <h5>Reports</h5>

                </div>

            </a>

        </div>

    </div>
<div class="row">

    <!-- LEFT : CHART -->

    <div class="col-lg-8 mb-4">

        <div class="dashboard-card">

            <h5>

                <i class="fa-solid fa-chart-line"></i>

                Bookings (Last 7 Days)

            </h5>

            <canvas id="bookingChart"></canvas>

        </div>

    </div>

    <!-- RIGHT : RECENT BOOKINGS -->

    <div class="col-lg-4">

        <div class="recent-card">

            <div class="recent-header">

                <h5>

                    <i class="fa-solid fa-clock-rotate-left"></i>

                    Recent Bookings

                </h5>

            </div>

            <div th:each="booking : ${recentBookings}"
                 class="recent-booking-item">

                <div class="recent-top">

                    <div class="recent-user">

                        <i class="fa-solid fa-user"></i>

                        <span th:text="${booking.user.username}">
                        </span>

                    </div>

                    <span class="role-user">
                        USER
                    </span>

                </div>

                <div class="recent-room">

                    <i class="fa-solid fa-bed"></i>

                    Room :

                    <span th:text="${booking.room.roomNumber}">
                    </span>

                </div>

                <div class="recent-date">

                    <i class="fa-regular fa-calendar"></i>

                    <span th:text="${booking.checkIn}">
                    </span>

                </div>

                <div class="mt-2">

                    <span class="status-booked"
                          th:text="${booking.status}">
                    </span>

                </div>

            </div>

        </div>

    </div>

</div>

</div>

<script th:src="@{/assets/js/dashboard.js}"></script>
<script th:inline="javascript">

let chartLabels =
/*[[${chartLabels}]]*/ [];

let chartData =
/*[[${chartData}]]*/ [];

const ctx =
document.getElementById('bookingChart');

if(ctx){

    new Chart(ctx,{

        type:'bar',

        data:{

            labels:chartLabels,

            datasets:[{

                label:'Bookings',

                data:chartData,

                borderWidth:1

            }]
        },

        options:{
            responsive:true
        }
    });
}

</script>
</body>
</html>
