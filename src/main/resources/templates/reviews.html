<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Reviews Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet"
      th:href="@{/assets/CSS/reviews.css}">

</head>

<body>

<div class="container mt-5 fade-in">

    <!-- SUCCESS MESSAGE -->
    <div class="alert alert-success"
         th:if="${param.msg}">
        Review deleted successfully!
    </div>

    <!-- HEADER -->
    <div class="top-box">

        <h1 class="page-title">

            <i class="fa-solid fa-star"></i>

            Customer Reviews

        </h1>

        <div>

            <a th:href="@{/dashboard}"
               class="btn btn-primary me-2">

                <i class="fa-solid fa-chart-line"></i>

                Dashboard

            </a>

            <a th:href="@{/logout}"
               class="btn btn-danger">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </a>

        </div>

    </div>

    <!-- TABLE -->
    <div class="card-box">

        <table class="table modern-table">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Customer</th>
                    <th>Review</th>
                    <th>Rating</th>
                    <th>Date</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

                <!-- EMPTY -->
                <tr th:if="${#lists.isEmpty(reviews)}">

                    <td colspan="6">

                        No reviews found

                    </td>

                </tr>

                <!-- DATA -->
                <tr th:each="review : ${reviews}">

                    <td th:text="${review.id}"></td>

                    <td class="username-cell"
                        th:text="${review.customerName}">
                    </td>

                    <td th:text="${review.reviewText}">
                    </td>

                    <td>

                        <span th:each="i : ${#numbers.sequence(1, review.rating)}">

                            <i class="fa-solid fa-star text-warning"></i>

                        </span>

                    </td>

                    <td th:text="${review.createdAt}">
                    </td>

                    <td>

                        <a th:href="@{/delete-review(id=${review.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Delete this review?')">

                            <i class="fa-solid fa-trash"></i>

                        </a>

                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
